name: Supabase Keep Alive

on:
  schedule:
    # Se ejecuta a las 00:00 UTC todos los lunes, miércoles y viernes
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña "Actions"

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hacer ping a Supabase
        env:
          SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "Error: Faltan los secretos PUBLIC_SUPABASE_URL o PUBLIC_SUPABASE_ANON_KEY en GitHub."
            exit 1
          fi
          
          echo "Realizando solicitud a la base de datos de Supabase..."
          
          # Hacemos una petición GET ligera a la tabla 'profile' para generar actividad
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${SUPABASE_URL}/rest/v1/profile?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          
          if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 201 ] || [ "$HTTP_STATUS" -eq 204 ]; then
            echo "✅ Ping exitoso. Código de respuesta: $HTTP_STATUS"
          else
            echo "❌ Error al contactar con Supabase. Código de respuesta: $HTTP_STATUS"
            exit 1
          fi
